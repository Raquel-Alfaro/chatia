<!DOCTYPE html>
<html>
<head>
    <title>Conversation detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>

<body style="background-color:#fce7f3">

    <div class="container mt-4">
        <h1 class="text-center text-dark mb-4">
            {{ conversation.title }}
        </h1>

        <a href="/" class="btn mb-3" style="background-color:#b57edc;color:white">Volver</a>
        <hr>

        <div id="messages">{% include 'chat/messages.html' %}</div>
        <hr>

        <form hx-post="" hx-target="#messages" hx-swap="innerHTML" hx-on::after-request="this.reset()" method="POST">
            {% csrf_token %}
            <div class="d-flex align-items-center gap-2 mb-5">
                <input type="text" name="content" placeholder="Escribe un mensaje" class="form-control">
                <button
                    type="submit"
                    class="btn rounded-circle"
                    style="
                        background-color:#d63384;
                        color:white;
                        width:50px;
                        height:50px;
                        font-size:22px;
                        display:flex;
                        align-items:center;
                        justify-content:center;">
                    ↑
                </button>
            </div>
        </form>
    </div>
    <script>window.scrollTo(0, document.body.scrollHeight);</script>
</body>
</html>
