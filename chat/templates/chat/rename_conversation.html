<!DOCTYPE html>
<html>
<head>
    <title>Renombrar conversación</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background-color:#fce7f3">
    <div class="container mt-5">
        <div class="card p-4 shadow">
            <h1 class="mb-4">Renombrar conversación</h1>

            <form method="POST">
                {% csrf_token %}
                <input type="text" name="title" value="{{ conversation.title }}" class="form-control mb-3">
                <button type="submit" class="btn" style="background-color:#d63384;color:white">
                    Guardar
                </button>
            </form>
        </div>
    </div>
</body>
</html>
